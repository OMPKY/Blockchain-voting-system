<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login Page</title>
  <link rel="stylesheet" type="text/css" href="../css/login.css">
  <link rel="icon" type="image/x-icon" href="/favicon.ico">

</head>

<body>
  <img src="../assets/suiit_logo.png" alt="College Logo" id="college-logo">

  
  <h1 class="modern-title">BLOCKCHAIN BASED VOTING SYSTEM</h1>

  <div class="login-box">
    <div class="suiitloginbox-side">
      <img src="../assets/suiit_logo.png" alt="SUIIT Logo" id="suiitloginbox-image">
    </div>

    <div class="form-side">
      <h1>Welcome!</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="voter-id"><h3>Voter ID</h3></label>
          <input type="text" class="form-control" id="voter-id" name="voter-id" placeholder="Enter Voter ID">
        </div>
        <div class="form-group">
          <label for="password"><h3>Password</h3></label>
          <input type="password" class="form-control" id="password" name="password" placeholder="Enter Password">
        </div>
        <button type="submit" class="btn btn-primary"><b>Login</b></button>
      </form>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
  <script src="../js/login.js" type="module"></script>
</body>
</html>
