<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Portal</title>
  <link rel="stylesheet" type="text/css" href="../css/admin.css">

  <script>
    // 🔹 FIX 1: Security redirect points to Web Server (3000)
    if (!localStorage.getItem('jwtTokenAdmin')) {
      window.location.replace("http://localhost:3000/");
    }
  </script>
</head>

<body>
  <div id="head" class="text-center">
    <h1 align="center" class="modern-title">BLOCKCHAIN BASED VOTING SYSTEM</h1>
    <button id="logoutBtn" class="btn btn-danger">Logout</button>
  </div>

  <div class="admin-sections">
    <div class="container left-container">
      <legend>Add Candidate</legend>
      <table class="table text-center">
        <tr>
          <th>Name</th>
          <td><input id="name" type="text" name="name" placeholder="Candidate's name" autocomplete="off"></td>
          <th>Party</th>
          <td><input id="party" type="text" name="party" placeholder="Candidate's party"></td>
        </tr>
      </table>
      <input id="addCandidate" type="submit" name="submit" value="Add Candidate">
      <p id="Aday"></p> </div>

    <div class="container right-container">
      <legend>Set Voting Date</legend>
      <table class="table text-center">
        <tr>
          <th>Start date</th>
          <td><input id="startDate" type="date" name=""></td>
          <th>End date</th>
          <td><input id="endDate" type="date" name=""></td>
        </tr>
      </table>
      <input id="addDate" type="submit" name="submit" value="Define Dates">
      <p id="Aday"></p> 
    </div>

    <div class="container full-width">
      <legend>Candidates & Votes</legend>

      <div style="display:flex; gap:10px; justify-content:flex-end; margin-bottom:10px;">
        <button id="refreshAdminCandidates" style="padding:8px 14px; border:none; border-radius:8px; cursor:pointer;">
          Refresh
        </button>
      </div>

      <table class="table text-center" id="adminCandidatesTable">
        <thead>
          <tr>
            <th>#</th>
            <th>Name</th>
            <th>Party</th>
            <th>Votes</th>
          </tr>
        </thead>
        <tbody id="adminCandidatesBody"></tbody>
      </table>

      <p id="adminCandidatesMsg" style="min-height:1.2em;"></p>
    </div>
  </div>

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
  <script src="../dist/app.bundle.js" type="module"></script>

  <script>
    // 🔹 FIX 2: Logout clears all data and redirects to Web Server (3000)
    document.getElementById("logoutBtn").addEventListener("click", function() {
      localStorage.clear(); // Wipes jwtTokenAdmin, jwtTokenVoter, and voter_id
      window.location.replace("http://localhost:3000/");
    });
  </script>
</body>
</html>
