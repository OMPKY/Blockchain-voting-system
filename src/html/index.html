<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Voting Page</title>

    <link rel="stylesheet" type="text/css" href="../css/index.css">
    
    <script>
      // 🔹 FIX 1: Security redirect points to Web Server (3000)
      if (!localStorage.getItem('jwtTokenVoter')) {
        window.location.replace("http://localhost:3000/");
      }
    </script>
  </head>

  <body>
    <div id="head" class="text-center">
      <h1 align="center">BLOCKCHAIN BASED VOTING SYSTEM</h1>
      <h2 align="center">Welcome for Voting</h2>
      <button id="logoutBtn" class="btn btn-danger">Logout</button>
      <h3 align="center">Voting Dates: <span id="dates"></span></h3>
      <br/>
    </div>

    <div id="candidate" class="container">
      <table class="table text-center">
        <thead>
          <tr>
            <th>Name</th>
            <th>Party</th>
            <th>Total Vote</th>
          </tr>
        </thead>
        <tbody id="boxCandidate"></tbody>
      </table>
      <br/>
      <div id="vote">
        <p>Please select one of the candidates and click the vote button.</p>
        <button id="voteButton" class="btn btn-primary" onclick="App.vote()" disabled>Vote</button>
        <div id="msg"></div>

        <div id="vote-box"></div>
      </div>
    </div>

    <div id="account">
      <p id="accountAddress" class="text-center"></p>
    </div>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.0/umd/popper.min.js"></script>
    <script src="../dist/app.bundle.js" type="module"></script>

    <script>
      // 🔹 FIX 2: Logout clears all data and redirects to Web Server (3000)
      document.getElementById("logoutBtn").addEventListener("click", function() {
        localStorage.clear(); // Wipes jwtTokenVoter and voter_id
        window.location.replace("http://localhost:3000/");
      });
    </script>
  </body>
</html>
